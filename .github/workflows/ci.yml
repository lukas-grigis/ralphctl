name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Format, lint, typecheck & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Verify dist works
        run: node dist/cli.mjs --version

      - name: Verify dist works from arbitrary cwd
        run: cd /tmp && node $GITHUB_WORKSPACE/dist/cli.mjs --version

      - name: Verify npm pack installs correctly
        run: |
          TARBALL=$(pnpm pack --pack-destination /tmp 2>/dev/null | tail -1)
          cd /tmp && mkdir -p ralphctl-smoke && cd ralphctl-smoke
          npm init -y
          npm install "$TARBALL"
          ./node_modules/.bin/ralphctl --version
