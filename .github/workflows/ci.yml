name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Format, lint, typecheck & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Verify dist works
        run: node dist/cli.mjs --version

      - name: Verify dist works from arbitrary cwd
        run: cd /tmp && node $GITHUB_WORKSPACE/dist/cli.mjs --version

      - name: Verify npm pack installs correctly
        run: |
          TARBALL=$(pnpm pack --pack-destination /tmp 2>/dev/null | tail -1)
          cd /tmp && mkdir -p ralphctl-smoke && cd ralphctl-smoke
          npm init -y
          npm install "$TARBALL"
          ./node_modules/.bin/ralphctl --version

  # Reproducibility gate. The fast `check` job above runs against whatever
  # node_modules the pnpm cache restores; that path can pass even when the
  # lockfile is missing entries (a clean clone would then 404 on missing
  # plugins). This job blows node_modules away and re-resolves from the
  # lockfile alone so a fresh contributor / fresh CI runner can't be the
  # first to discover install drift.
  cold-install:
    name: Cold-install smoke (fresh node_modules from lockfile)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Wipe node_modules (prove a clean tree)
        run: rm -rf node_modules

      - name: Cold install from lockfile
        run: pnpm install --frozen-lockfile

      - name: Type check (cold)
        run: pnpm typecheck

      - name: Lint (cold)
        run: pnpm lint

      - name: Test (cold)
        run: pnpm test

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.event.pull_request.number }}
          path: coverage/
          retention-days: 14
          if-no-files-found: error
